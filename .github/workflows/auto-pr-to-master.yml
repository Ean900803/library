name: Auto PR feature → master

on:
  push:
    branches:
      - "feat/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create PR to master via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 從 branch 名稱抓出 issue 編號
          # feat/42-search → 42
          ISSUE_NUMBER=$(echo "${{ github.ref_name }}" | grep -oP '\d+' | tail -1)

          if [ -n "$ISSUE_NUMBER" ]; then
            gh pr create \
              --title "[Feat] ${{ github.ref_name }} → master" \
              --body "## Feat PR
            - **Branch:** \`${{ github.ref_name }}\`
            - **Author:** ${{ github.actor }}
            - **Commit:** ${{ github.sha }}

            fixes #${ISSUE_NUMBER}" \
            --base master \
            --head ${{ github.ref_name }} \
            || echo "PR already exists, skipping"
          else
            echo "No issue number found in branch name, skipping PR creation"
          fi
