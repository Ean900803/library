name: Auto PR feature → master

on:
  push:
    branches:
      - "feat/**"

jobs:
  create-pr:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create PR to master via GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "[Feat] ${{ github.ref_name }} → master" \
            --body "## Feat PR
            - **Branch:** \`${{ github.ref_name }}\`
            - **Author:** ${{ github.actor }}
            - **Commit:** ${{ github.sha }}" \
            --base master \
            --head ${{ github.ref_name }} \
            || echo "PR already exists, skipping"
